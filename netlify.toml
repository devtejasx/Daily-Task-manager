[build]
  command = "cd frontend && npm run build"
  publish = "frontend/.next"
  functions = "backend/functions"

[[redirects]]
  from = "/api/*"
  to = ":splat"
  status = 200

[dev]
  command = "cd frontend && npm run dev"
  port = 3000
  publish = "frontend/.next"

# Redirect all requests to next.js (for SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
